<!DOCTYPE html>

<html lang="en" xmlns="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="utf-8" />
    <link href="{{ url_for('static', filename='content/bootstrap.min.css') }}" rel="stylesheet" />
    <script src="{{ url_for('static', filename='scripts/bootstrap.min.js') }}"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/daterangepicker/daterangepicker.css" />
    <script src="https://cdn.jsdelivr.net/npm/jquery/dist/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/moment/min/moment.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/daterangepicker/daterangepicker.min.js"></script>
    <title>Hotelguru</title>
</head>
<body>
    <div class="container">
        <div class="row m-2">
            <div class="col-lg-1 col-sm-1">
                <p class="h3 text-danger m">Hotelguru</p>
            </div>
            <div class="col-lg-10 col-sm-10"></div>
            <div class="col-lg-1 col-sm-1">
                <button type="button" class="btn btn-danger" data-bs-toggle="modal" data-bs-target="#Login">Bejelentkezés</button>
                <!-- The Modal -->
                <div class="modal" id="Login">
                    <div class="modal-dialog">
                        <div class="modal-content">

                            <!-- Modal Header -->
                            <div class="modal-header">
                                <h4 class="modal-title">Bejelentkezés:</h4>
                                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                            </div>

                            <!-- Modal body -->
                            <form method="post">
                                <div class="modal-body">
                                    <div>
                                        <label for="email">Email:</label>
                                        <input type="email" class="form-control" id="email" placeholder="Enter email" name="email">
                                    </div>
                                    <div>
                                        <label for="pwd">Jelszó:</label>
                                        <input type="password" class="form-control" id="pwd" placeholder="Enter password" name="pswd">
                                    </div>
                                    <div class="form-check">
                                        <label class="form-check-label">
                                            <input class="form-check-input" type="checkbox" name="remember">Emlékezz rám
                                        </label>
                                    </div>
                                        <a href="#" class="text-danger">Regisztráció</a>
                                    <div class="modal-footer">
                                        <button type="submit" class="btn btn-danger col-12">Bejelentkezés</button>
                                        <button type="button" class="btn btn-danger col-12" data-bs-dismiss="modal">Mégse</button>
                                    </div>
                                </div>
                        </form>

                            
                            

                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div class="row">


            <div id="demo" class="carousel slide" data-bs-ride="carousel">

                <!-- Indicators/dots -->
                <div class="carousel-indicators">
                    <button type="button" data-bs-target="#demo" data-bs-slide-to="0" class="active"></button>
                    <button type="button" data-bs-target="#demo" data-bs-slide-to="1"></button>
                    <button type="button" data-bs-target="#demo" data-bs-slide-to="2"></button>
                </div>

                <!-- carousel -->
                <div class="carousel-inner">
                    <div class="carousel-item active">
                        <img src="{{ url_for('static', filename='images/hotel1.jpg') }}" alt="Miskolc" class="d-block w-100">
                        <div class="carousel-caption text-dark bg-light-text">
                            <h3>Hotel Miskolc</h3>
                            <p>Most akciós szobák!</p>
                        </div>
                    </div>
                    <div class="carousel-item">
                        <img src="{{ url_for('static', filename='images/hotel2.jpg') }}" alt="Salgotarján" class="d-block w-100">
                        <div class="carousel-caption text-dark bg-light-text">
                            <h3>Angyal Hotel Salgotarján</h3>
                            <p>Két ágyas szoba teraszal 3 éjszakára most csak: 450 000 FT</p>
                        </div>
                    </div>
                    <div class="carousel-item">
                        <img src="{{ url_for('static', filename='images/hotel3.jpg') }}" alt="Tárkány" class="d-block w-100">
                        <div class="carousel-caption text-dark bg-light-text">
                            <h3>Tárkány vendégszálló</h3>
                            <p>Két ágyas szoba fél panzió ellátással most csak: 240 000 FT</p>
                        </div>
                    </div>
                </div>

                <!-- nyilak a carouselben -->
                <button class="carousel-control-prev" type="button" data-bs-target="#demo" data-bs-slide="prev">
                    <span class="carousel-control-prev-icon"></span>
                </button>
                <button class="carousel-control-next" type="button" data-bs-target="#demo" data-bs-slide="next">
                    <span class="carousel-control-next-icon"></span>
                </button>
            </div>
        </div>

        <style>
            .carousel-item img {
                height: 400px;
                object-fit: cover;
            }
        </style>

        <div class="row">
            <nav class="navbar navbar-expand-sm navbar-dark bg-dark m-2">
                <div class="container-fluid">
                    <a class="navbar-brand" href="javascript:void(0)">Logo</a>
                    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mynavbar">
                        <span class="navbar-toggler-icon"></span>
                    </button>
                    <div class="collapse navbar-collapse" id="mynavbar">
                        <ul class="navbar-nav me-auto">
                            <li class="nav-item">
                                <a class="nav-link" href="javascript:void(0)">Link</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link" href="javascript:void(0)">Link</a>
                            </li>
                            <li class="nav-item">
                                <div data-coreui-start-date="2022/08/03"
                                     data-coreui-end-date="2022/08/17"
                                     data-coreui-locale="en-US"
                                     data-coreui-toggle="date-range-picker">
                                </div>
                            </li>
                        </ul>
                        <form class="d-flex">
                            <input type="text" id="daterange" class="form-control me-2" placeholder="Dátum kiválasztás">
                            <script>
                                $(function () {
                                    $('#daterange').daterangepicker({
                                        opens: 'center',
                                        locale: {
                                            format: 'YYYY-MM-DD'
                                        }
                                    });
                                });
                            </script>
                            <input class="form-control me-2" type="text" placeholder="Search">
                            <button class="btn btn-danger" type="button">Search</button>
                        </form>
                    </div>
                </div>
            </nav>
        </div>

    </div>
</body>
</html>
